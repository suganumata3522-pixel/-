{% extends "base.html" %}
{% block title %}仕入登録{% endblock %}
{% block content %}
<h1>仕入登録</h1>

<div class="card">
  <form method="post" action="{{ url_for('main.purchase_new') }}">
    {% if candidate %}<input type="hidden" name="candidate_id" value="{{ candidate.id }}">{% endif %}
    <div class="form-grid">
      <div><label>商品名 *</label>
        <input name="name" required style="width:100%" value="{{ candidate.name if candidate else '' }}"></div>
      <div><label>仕入元</label>
        <input name="source" value="{{ candidate.source if candidate else '' }}"></div>
      <div><label>商品URL</label>
        <input name="url" style="width:100%" value="{{ candidate.url if candidate else '' }}"></div>
      <div><label>数量 *</label>
        <input name="qty" type="number" min="1" value="1" required></div>
      <div><label>仕入単価(円) *</label>
        <input name="unit_cost" required value="{{ candidate.cost if candidate else '' }}"></div>
      <div><label>獲得ポイント(合計)</label>
        <input name="points" value="{{ ((candidate.cost * candidate.point_rate / 100)|round|int) if candidate else 0 }}"></div>
      <div><label>仕入日 *</label>
        <input name="purchase_date" type="date" value="{{ (candidate.buy_date or today) if candidate else today }}" required></div>
      <div><label>販売予定販路</label>
        <select name="channel_id">
          <option value="">未定</option>
          {% for ch in channels %}
          <option value="{{ ch.id }}" {% if candidate and candidate.channel_id == ch.id %}selected{% endif %}>{{ ch.name }}</option>
          {% endfor %}
        </select></div>
      <div><label>状態</label>
        <select name="status"><option>在庫</option><option>出品中</option></select></div>
      <div><label>メモ</label><input name="notes" style="width:100%"></div>
    </div>
    {% if candidate and candidate.buy_date %}
    <p class="notice">💡 この商品の推奨購入日は <strong>{{ candidate.buy_date }}</strong> です({{ candidate.buy_reason }})</p>
    {% endif %}
    <p style="margin-top:14px">
      <button type="submit">登録する</button>
      <a class="btn secondary" href="{{ url_for('main.purchases') }}">キャンセル</a>
    </p>
  </form>
</div>
{% endblock %}
