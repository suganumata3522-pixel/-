<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}電脳せどり管理{% endblock %} | 電脳せどり管理ツール</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
  <div class="brand">📦 電脳せどり管理ツール</div>
  <nav>
    <a href="{{ url_for('main.dashboard') }}">ダッシュボード</a>
    <a href="{{ url_for('main.research_view') }}">商品リサーチ</a>
    <a href="{{ url_for('main.candidates') }}">候補商品</a>
    <a href="{{ url_for('main.timing_view') }}">購入日判断</a>
    <a href="{{ url_for('main.purchases') }}">仕入管理</a>
    <a href="{{ url_for('main.sales') }}">売上管理</a>
    <a href="{{ url_for('main.report') }}">レポート</a>
    <a href="{{ url_for('main.channels') }}">販路設定</a>
    <a href="{{ url_for('main.settings_view') }}">設定</a>
  </nav>
</header>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="flash {{ category }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<footer>電脳せどり管理ツール — リサーチ / 販路 / 購入日判断 / 仕入・売上を一元管理</footer>
</body>
</html>
