{% extends "base.html" %}
{% block title %}出品ドラフト作成{% endblock %}
{% block content %}
<h1>出品ドラフト作成</h1>

<div class="card">
  <p class="muted">商品情報を入れて販路を選ぶと、各販路の慣習に合わせたタイトル・説明文・タグ・推奨価格を自動生成します。</p>
  <form method="post" action="{{ url_for('main.listing_generate') }}">
    {% if purchase %}<input type="hidden" name="purchase_id" value="{{ purchase.id }}">{% endif %}
    <div class="form-grid">
      <div><label>商品名 *</label>
        <input name="name" required style="width:100%" value="{{ purchase.name if purchase else '' }}"></div>
      <div><label>商品の状態 *</label>
        <select name="condition">
          {% for c in conditions %}<option>{{ c }}</option>{% endfor %}
        </select></div>
      <div><label>仕入単価(円)</label>
        <input name="cost" value="{{ purchase.unit_cost if purchase else 0 }}">
        <span class="muted">推奨価格・損益分岐の計算に使用</span></div>
      <div><label>獲得ポイント(1個あたり)</label>
        <input name="points" value="{{ ((purchase.points / purchase.qty)|round|int) if purchase and purchase.qty else 0 }}"></div>
      <div><label>付属品</label>
        <input name="accessories" style="width:100%" placeholder="例: 箱・説明書付き"></div>
      <div><label>補足(任意)</label>
        <input name="notes" style="width:100%" placeholder="例: 暗所にて保管していました"></div>
    </div>
    <h2>出品する販路(複数選択可)</h2>
    <div class="card" style="margin-bottom:12px">
      {% for ch in channels %}
      <label style="display:inline-block; margin-right:16px; font-size:14px">
        <input type="checkbox" name="channel_ids" value="{{ ch.id }}" style="width:auto"
          {% if purchase and purchase.channel_id == ch.id %}checked{% endif %}>
        {{ ch.name }} <span class="muted">(手数料{{ ch.fee_rate }}%)</span>
      </label>
      {% endfor %}
    </div>
    <button type="submit">出品ドラフトを自動生成</button>
    <a class="btn secondary" href="{{ url_for('main.listings') }}">キャンセル</a>
  </form>
</div>
{% endblock %}
