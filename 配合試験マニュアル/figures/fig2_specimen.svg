<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <style>
    .t{fill:#1a2b3c;font-size:15px;}
    .tb{fill:#1a2b3c;font-size:20px;font-weight:bold;}
    .dim{fill:#c0392b;font-size:14px;font-weight:bold;}
    .lbl{fill:#2f6db5;font-size:14px;font-weight:bold;}
    .note{fill:#5a6b7b;font-size:13px;}
  </style>
  <defs>
    <marker id="d" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="ds" markerWidth="9" markerHeight="9" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <text x="380" y="32" text-anchor="middle" class="tb">図2　供試体とモールドの標準寸法</text>

  <!-- mold cross section -->
  <g transform="translate(150,70)">
    <!-- soil filled mold -->
    <rect x="60" y="0" width="120" height="240" fill="#cdb89a" stroke="#7a6a52" stroke-width="3"/>
    <!-- 3 layers -->
    <line x1="60" y1="80" x2="180" y2="80" stroke="#7a6a52" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="60" y1="160" x2="180" y2="160" stroke="#7a6a52" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="120" y="48" text-anchor="middle" class="note">3層目</text>
    <text x="120" y="128" text-anchor="middle" class="note">2層目</text>
    <text x="120" y="208" text-anchor="middle" class="note">1層目</text>

    <!-- height dimension -->
    <line x1="210" y1="0" x2="210" y2="240" stroke="#c0392b" stroke-width="1.5" marker-start="url(#ds)" marker-end="url(#d)"/>
    <text x="222" y="125" class="dim">h = 100 mm</text>

    <!-- diameter dimension -->
    <line x1="60" y1="-18" x2="180" y2="-18" stroke="#c0392b" stroke-width="1.5" marker-start="url(#ds)" marker-end="url(#d)"/>
    <text x="120" y="-26" text-anchor="middle" class="dim">φ50 mm</text>

    <text x="120" y="270" text-anchor="middle" class="lbl">改良処理土を3層に分けて充填</text>
    <text x="120" y="290" text-anchor="middle" class="note">各層ごとに気泡を抜く（タッピング／突き）</text>
  </g>

  <!-- finished specimen -->
  <g transform="translate(470,70)">
    <path d="M35,10 L35,235 A45,12 0 0 0 125,235 L125,10" fill="#c2ad8c" stroke="#7a6a52" stroke-width="2.5"/>
    <ellipse cx="80" cy="10" rx="45" ry="12" fill="#d8c8ad" stroke="#7a6a52" stroke-width="2.5"/>
    <text x="80" y="265" text-anchor="middle" class="lbl">脱型後の供試体</text>
    <text x="80" y="285" text-anchor="middle" class="note">端面を平面に成形</text>
    <text x="80" y="304" text-anchor="middle" class="note">高さ／直径 = 2.0</text>
  </g>

  <line x1="370" y1="180" x2="450" y2="180" stroke="#2f6db5" stroke-width="2.5" marker-end="url(#d)" fill="none"/>
  <text x="410" y="170" text-anchor="middle" class="note">養生・脱型</text>
</svg>
