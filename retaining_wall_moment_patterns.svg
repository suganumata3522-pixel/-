<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 980" font-family="Helvetica, Arial, 'Noto Sans CJK JP', sans-serif">
  <style>
    .ttl { font-size: 24px; font-weight: bold; fill:#111; }
    .sub { font-size: 18px; font-weight: bold; fill:#0d47a1; }
    .lbl { font-size: 14px; fill:#111; }
    .sml { font-size: 12px; fill:#333; }
    .tiny{ font-size: 11px; fill:#555; }
    .axis { stroke:#333; stroke-width:1.4; fill:none; }
    .wall { fill:#cfd8dc; stroke:#37474f; stroke-width:1.8; }
    .soil { fill:#d7ccc8; }
    .ground { stroke:#5d4037; stroke-width:1; fill:none; }
    .pressure { fill:#90caf9; opacity:0.5; stroke:#1565c0; stroke-width:1; }
    .mP { fill:#ef9a9a; opacity:0.72; stroke:#b71c1c; stroke-width:1.4; }   /* 竪壁 引張背面 */
    .mG { fill:#a5d6a7; opacity:0.72; stroke:#1b5e20; stroke-width:1.4; }   /* かかと 下面 */
    .mO { fill:#ffe082; opacity:0.8;  stroke:#ff6f00; stroke-width:1.4; }   /* つま先 上面 */
    .arrow { stroke:#1565c0; stroke-width:1.3; fill:none; marker-end:url(#ah); }
    .arrowR{ stroke:#2e7d32; stroke-width:1.3; fill:none; marker-end:url(#ahg); }
    .dash { stroke:#777; stroke-dasharray:4 4; stroke-width:1; fill:none; }
    .box  { fill:#fafafa; stroke:#bdbdbd; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565c0"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/></marker>
  </defs>

  <text x="590" y="36" text-anchor="middle" class="ttl">擁壁タイプ別 曲げモーメント分布(概念図)</text>

  <!-- 凡例 -->
  <g transform="translate(300,52)">
    <rect x="0" y="0" width="16" height="12" class="mP"/><text x="22" y="11" class="sml">引張(背面/下面)側のM</text>
    <rect x="200" y="0" width="16" height="12" class="mO"/><text x="222" y="11" class="sml">上面引張のM</text>
    <rect x="360" y="0" width="16" height="12" class="pressure"/><text x="382" y="11" class="sml">主働土圧</text>
    <line class="arrowR" x1="470" y1="12" x2="470" y2="0"/><text x="480" y="11" class="sml">地盤反力</text>
  </g>

  <!-- =================================================================== -->
  <!-- ①  逆T式 (Inverted-T / Cantilever)                                  -->
  <!-- =================================================================== -->
  <g transform="translate(40,90)">
    <text x="180" y="20" text-anchor="middle" class="sub">① 逆T式(片持ばり式)</text>

    <!-- 構造 -->
    <g transform="translate(0,30)">
      <polygon class="soil" points="150,10 300,10 300,250 150,250"/>
      <line class="ground" x1="150" y1="10" x2="300" y2="10"/>
      <polygon class="wall" points="125,10 150,10 150,250 125,250"/>      <!-- 竪壁 -->
      <polygon class="wall" points="50,250 290,250 290,282 50,282"/>      <!-- 底版 -->
      <polygon class="pressure" points="150,10 150,250 215,250"/>
      <line class="arrow" x1="185" y1="80"  x2="153" y2="80"/>
      <line class="arrow" x1="200" y1="160" x2="153" y2="160"/>
      <line class="arrow" x1="212" y1="235" x2="153" y2="235"/>
      <line class="arrowR" x1="80"  y1="320" x2="80"  y2="285"/>
      <line class="arrowR" x1="150" y1="315" x2="150" y2="285"/>
      <line class="arrowR" x1="220" y1="308" x2="220" y2="285"/>
      <text x="95" y="135" text-anchor="middle" class="sml">竪壁</text>
      <text x="95" y="276" text-anchor="middle" class="tiny">つま先</text>
      <text x="245" y="276" text-anchor="middle" class="tiny">かかと</text>
    </g>

    <!-- M図 -->
    <g transform="translate(0,400)">
      <text x="180" y="-8" text-anchor="middle" class="lbl">M図</text>
      <line class="axis" x1="150" y1="0" x2="150" y2="240"/>   <!-- 竪壁中心線 -->
      <line class="axis" x1="50"  y1="258" x2="290" y2="258"/> <!-- 底版中心線 -->
      <!-- 竪壁 3次曲線 背面引張 -->
      <path class="mP" d="M150,0 C162,90 200,170 235,240 L150,240 Z"/>
      <text x="248" y="160" class="tiny" fill="#b71c1c">∝ y³</text>
      <circle cx="235" cy="240" r="3.5" fill="#b71c1c"/>
      <text x="240" y="236" class="tiny" fill="#b71c1c">最大(付け根)</text>
      <!-- かかと 下面引張 -->
      <path class="mG" d="M150,258 C180,292 250,300 290,258 Z"/>
      <text x="255" y="312" class="tiny" fill="#1b5e20">かかと(下面)</text>
      <!-- つま先 上面引張 -->
      <path class="mO" d="M150,258 C120,235 80,232 50,258 Z"/>
      <text x="55" y="228" class="tiny" fill="#e65100">つま先(上面)</text>
      <circle cx="150" cy="258" r="4" fill="#000"/>
    </g>
  </g>

  <!-- =================================================================== -->
  <!-- ②  L型 (L-shaped)                                                   -->
  <!-- =================================================================== -->
  <g transform="translate(420,90)">
    <text x="180" y="20" text-anchor="middle" class="sub">② L型(かかと版なし)</text>

    <g transform="translate(0,30)">
      <polygon class="soil" points="150,10 300,10 300,250 150,250"/>
      <line class="ground" x1="150" y1="10" x2="300" y2="10"/>
      <polygon class="wall" points="125,10 150,10 150,250 125,250"/>       <!-- 竪壁 -->
      <!-- 底版: つま先側はゼロ、かかと(背面)側に伸ばす L型 -->
      <polygon class="wall" points="125,250 290,250 290,282 125,282"/>
      <polygon class="pressure" points="150,10 150,250 215,250"/>
      <line class="arrow" x1="185" y1="80"  x2="153" y2="80"/>
      <line class="arrow" x1="200" y1="160" x2="153" y2="160"/>
      <line class="arrow" x1="212" y1="235" x2="153" y2="235"/>
      <line class="arrowR" x1="160" y1="318" x2="160" y2="285"/>
      <line class="arrowR" x1="220" y1="310" x2="220" y2="285"/>
      <line class="arrowR" x1="270" y1="305" x2="270" y2="285"/>
      <text x="95" y="135" text-anchor="middle" class="sml">竪壁</text>
      <text x="210" y="276" text-anchor="middle" class="tiny">かかと版のみ</text>
      <text x="95" y="300" text-anchor="middle" class="tiny" fill="#c62828">つま先版なし</text>
    </g>

    <g transform="translate(0,400)">
      <text x="180" y="-8" text-anchor="middle" class="lbl">M図</text>
      <line class="axis" x1="150" y1="0" x2="150" y2="240"/>
      <line class="axis" x1="125" y1="258" x2="290" y2="258"/>
      <!-- 竪壁 同じく付け根最大 -->
      <path class="mP" d="M150,0 C162,90 200,170 235,240 L150,240 Z"/>
      <text x="248" y="160" class="tiny" fill="#b71c1c">∝ y³</text>
      <circle cx="235" cy="240" r="3.5" fill="#b71c1c"/>
      <text x="240" y="236" class="tiny" fill="#b71c1c">最大(付け根)</text>
      <!-- かかと版のみ 下面引張 -->
      <path class="mG" d="M150,258 C185,296 255,300 290,258 Z"/>
      <text x="250" y="314" class="tiny" fill="#1b5e20">かかと(下面)</text>
      <circle cx="150" cy="258" r="4" fill="#000"/>
      <text x="60" y="262" class="tiny" fill="#c62828">M≒0</text>
    </g>
  </g>

  <!-- =================================================================== -->
  <!-- ③  重力式 (Gravity)                                                 -->
  <!-- =================================================================== -->
  <g transform="translate(800,90)">
    <text x="180" y="20" text-anchor="middle" class="sub">③ 重力式(無筋)</text>

    <g transform="translate(0,30)">
      <polygon class="soil" points="190,10 320,10 320,260 190,260"/>
      <line class="ground" x1="190" y1="10" x2="320" y2="10"/>
      <!-- 台形断面 -->
      <polygon class="wall" points="120,10 175,10 230,260 80,260"/>
      <polygon class="pressure" points="190,10 190,260 250,260"/>
      <line class="arrow" x1="220" y1="90"  x2="193" y2="90"/>
      <line class="arrow" x1="235" y1="170" x2="193" y2="170"/>
      <line class="arrow" x1="248" y1="245" x2="193" y2="245"/>
      <line class="arrowR" x1="110" y1="300" x2="110" y2="263"/>
      <line class="arrowR" x1="170" y1="295" x2="170" y2="263"/>
      <line class="arrowR" x1="215" y1="290" x2="215" y2="263"/>
      <text x="150" y="150" text-anchor="middle" class="sml">自重で抵抗</text>
    </g>

    <g transform="translate(0,400)">
      <text x="180" y="-8" text-anchor="middle" class="lbl">M図(断面内応力)</text>
      <line class="axis" x1="150" y1="0" x2="150" y2="260"/>
      <!-- 合成応力: 引張を出さない設計。Mは小さく底面で最大 -->
      <path class="mP" d="M150,0 C156,90 175,180 200,258 L150,258 Z"/>
      <circle cx="200" cy="258" r="3.5" fill="#b71c1c"/>
      <text x="205" y="255" class="tiny" fill="#b71c1c">底面で最大</text>
      <text x="40" y="120" class="tiny">原則として</text>
      <text x="40" y="138" class="tiny">引張を生じ</text>
      <text x="40" y="156" class="tiny">させない</text>
      <text x="40" y="174" class="tiny">(合力を断面</text>
      <text x="40" y="192" class="tiny">中央1/3=核内</text>
      <text x="40" y="210" class="tiny">に収める)</text>
    </g>
  </g>

  <!-- =================================================================== -->
  <!-- ④  控え壁式 (Counterfort) — 横方向の挙動                            -->
  <!-- =================================================================== -->
  <g transform="translate(40,700)">
    <rect x="0" y="0" width="1100" height="250" class="box"/>
    <text x="14" y="26" class="sub">④ 控え壁(バットレス)式 — 大型擁壁(H&gt;6〜8m目安)</text>

    <!-- 平面的な挙動説明 -->
    <g transform="translate(30,45)">
      <!-- 竪壁を上から見た図 -->
      <line class="axis" x1="0" y1="40" x2="360" y2="40"/>
      <text x="180" y="30" text-anchor="middle" class="sml">竪壁(水平方向スパン)</text>
      <!-- 控え壁位置 -->
      <line x1="60" y1="40" x2="60" y2="70" stroke="#37474f" stroke-width="4"/>
      <line x1="180" y1="40" x2="180" y2="70" stroke="#37474f" stroke-width="4"/>
      <line x1="300" y1="40" x2="300" y2="70" stroke="#37474f" stroke-width="4"/>
      <text x="60" y="86" text-anchor="middle" class="tiny">控え壁</text>
      <text x="180" y="86" text-anchor="middle" class="tiny">控え壁</text>
      <text x="300" y="86" text-anchor="middle" class="tiny">控え壁</text>
      <!-- 連続ばりのM図(支点で負・スパン中央で正) -->
      <g transform="translate(0,120)">
        <line class="axis" x1="0" y1="20" x2="360" y2="20"/>
        <!-- 支点(控え壁)で負(上)、中央で正(下) -->
        <path class="mP" d="M60,20 C90,-15 150,-15 180,20 C210,-15 270,-15 300,20 L300,20
                            C270,55 210,55 180,20 C150,55 90,55 60,20 Z"/>
        <text x="60" y="-2" text-anchor="middle" class="tiny" fill="#b71c1c">支点負</text>
        <text x="120" y="56" text-anchor="middle" class="tiny" fill="#b71c1c">中央正</text>
      </g>
      <text x="180" y="240" text-anchor="middle" class="tiny">竪壁は控え壁を支点とする「水平連続版」 → 支点(控え壁)で負、スパン中央で正のM</text>
    </g>

    <!-- 解説テキスト -->
    <g transform="translate(470,55)">
      <text x="0" y="0"  class="sml">・竪壁の鉛直方向曲げに加え、<tspan font-weight="bold">控え壁間で水平方向にも曲げ</tspan>が生じる。</text>
      <text x="0" y="24" class="sml">・控え壁自体は背面土圧を底版・基礎へ伝える<tspan font-weight="bold">T型ばり(引張側=背面)</tspan>として働く。</text>
      <text x="0" y="48" class="sml">・逆T/L型より部材厚を抑えられ、高さの大きい擁壁に有利。</text>
      <text x="0" y="80" class="lbl">■ 継手位置の共通原則(全タイプ)</text>
      <text x="0" y="104" class="sml">・<tspan fill="#b71c1c" font-weight="bold">M最大=竪壁付け根</tspan>では継手を設けない。</text>
      <text x="0" y="126" class="sml">・竪壁は<tspan font-weight="bold">応力の小さい上部</tspan>、底版は<tspan font-weight="bold">端部寄り</tspan>で千鳥配置。</text>
      <text x="0" y="148" class="sml">・引張側継手は重ね長さ割増、または機械式/ガス圧接継手を採用。</text>
    </g>
  </g>
</svg>
