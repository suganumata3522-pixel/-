<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDoリスト</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --line: #e2e8f0;
    --text: #1f2933;
    --muted: #7b8794;
    --accent: #2f80ed;
    --accent-dark: #1c63c4;
    --high: #e74c3c;
    --mid: #f39c12;
    --low: #27ae60;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Meiryo", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    padding: 16px;
    margin-bottom: 18px;
  }

  .form {
    display: grid;
    grid-template-columns: 1fr 150px 120px auto;
    gap: 10px;
    align-items: end;
  }
  .form label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input, select, button {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 11px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    width: 100%;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  button.add {
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
    padding: 9px 18px;
  }
  button.add:hover { background: var(--accent-dark); }

  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .toolbar .spacer { flex: 1; }
  .chip {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: #fff;
    cursor: pointer;
    color: var(--muted);
    width: auto;
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .count { font-size: 13px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 11px 10px; border-bottom: 1px solid var(--line); font-size: 14px; }
  th { font-size: 12px; color: var(--muted); font-weight: 600; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--accent); }
  td.center, th.center { text-align: center; }
  tr.done td.task { text-decoration: line-through; color: var(--muted); }

  .badge {
    display: inline-block;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    color: #fff;
    font-weight: 600;
  }
  .badge.high { background: var(--high); }
  .badge.mid  { background: var(--mid); }
  .badge.low  { background: var(--low); }

  .due.over { color: var(--high); font-weight: 600; }
  .due.soon { color: var(--mid); font-weight: 600; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    width: auto;
    padding: 4px 6px;
    color: var(--muted);
    border-radius: 6px;
  }
  .icon-btn:hover { background: var(--bg); color: var(--high); }

  .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: 14px; }

  @media (max-width: 640px) {
    .form { grid-template-columns: 1fr; }
    th.hide-sm, td.hide-sm { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 ToDoリスト</h1>
  <p class="sub">タスクはこのPCのブラウザに自動保存されます。このファイルをダブルクリックすればいつでも開けます。</p>

  <div class="card">
    <form class="form" id="addForm">
      <div>
        <label for="task">タスク名</label>
        <input type="text" id="task" placeholder="やることを入力" required autocomplete="off">
      </div>
      <div>
        <label for="due">期限</label>
        <input type="date" id="due">
      </div>
      <div>
        <label for="priority">優先度</label>
        <select id="priority">
          <option value="high">高</option>
          <option value="mid" selected>中</option>
          <option value="low">低</option>
        </select>
      </div>
      <button type="submit" class="add">追加</button>
    </form>
  </div>

  <div class="card">
    <div class="toolbar">
      <button class="chip active" data-filter="all">すべて</button>
      <button class="chip" data-filter="active">未完了</button>
      <button class="chip" data-filter="done">完了</button>
      <span class="spacer"></span>
      <span class="count" id="count"></span>
      <button class="chip" id="clearDone">完了を削除</button>
    </div>

    <table>
      <thead>
        <tr>
          <th class="center" style="width:44px;">完了</th>
          <th class="sortable" data-sort="task">タスク名</th>
          <th class="sortable hide-sm" data-sort="due" style="width:140px;">期限</th>
          <th class="sortable center" data-sort="priority" style="width:90px;">優先度</th>
          <th class="center" style="width:50px;"></th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">タスクはありません。上のフォームから追加してください。</div>
  </div>
</div>

<script>
  const STORAGE_KEY = "todo.items.v1";
  const PRIORITY = { high: { label: "高", cls: "high", rank: 0 },
                     mid:  { label: "中", cls: "mid",  rank: 1 },
                     low:  { label: "低", cls: "low",  rank: 2 } };

  let items = load();
  let filter = "all";
  let sort = { key: "priority", dir: 1 };

  const $ = (id) => document.getElementById(id);

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch (e) { return []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

  function addItem(task, due, priority) {
    items.push({ id: Date.now() + Math.random(), task, due, priority, done: false });
    save();
    render();
  }

  function toggleDone(id) {
    const it = items.find(i => i.id === id);
    if (it) { it.done = !it.done; save(); render(); }
  }

  function removeItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function dueClass(due, done) {
    if (!due || done) return "";
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(due + "T00:00:00");
    const diff = Math.round((d - today) / 86400000);
    if (diff < 0) return "over";
    if (diff <= 2) return "soon";
    return "";
  }

  function formatDue(due) {
    if (!due) return "—";
    const d = new Date(due + "T00:00:00");
    const w = ["日","月","火","水","木","金","土"][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()}(${w})`;
  }

  function sortedFiltered() {
    let list = items.filter(i =>
      filter === "all" ? true : filter === "active" ? !i.done : i.done);

    list.sort((a, b) => {
      let va, vb;
      if (sort.key === "priority") { va = PRIORITY[a.priority].rank; vb = PRIORITY[b.priority].rank; }
      else if (sort.key === "due") { va = a.due || "9999-99-99"; vb = b.due || "9999-99-99"; }
      else { va = a.task; vb = b.task; }
      if (va < vb) return -1 * sort.dir;
      if (va > vb) return  1 * sort.dir;
      return 0;
    });
    return list;
  }

  function render() {
    const list = sortedFiltered();
    const tbody = $("list");
    tbody.innerHTML = "";

    list.forEach(it => {
      const tr = document.createElement("tr");
      if (it.done) tr.className = "done";
      const p = PRIORITY[it.priority];
      const dc = dueClass(it.due, it.done);

      tr.innerHTML = `
        <td class="center"><input type="checkbox" ${it.done ? "checked" : ""} style="width:auto;cursor:pointer;"></td>
        <td class="task">${escapeHtml(it.task)}</td>
        <td class="hide-sm due ${dc}">${formatDue(it.due)}</td>
        <td class="center"><span class="badge ${p.cls}">${p.label}</span></td>
        <td class="center"><button class="icon-btn" title="削除">🗑</button></td>
      `;
      tr.querySelector('input[type="checkbox"]').addEventListener("change", () => toggleDone(it.id));
      tr.querySelector(".icon-btn").addEventListener("click", () => removeItem(it.id));
      tbody.appendChild(tr);
    });

    $("empty").style.display = list.length ? "none" : "block";
    const remaining = items.filter(i => !i.done).length;
    $("count").textContent = `未完了 ${remaining} / 全 ${items.length} 件`;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  // --- events ---
  $("addForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const task = $("task").value.trim();
    if (!task) return;
    addItem(task, $("due").value, $("priority").value);
    $("task").value = "";
    $("due").value = "";
    $("priority").value = "mid";
    $("task").focus();
  });

  document.querySelectorAll(".chip[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".chip[data-filter]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filter = btn.dataset.filter;
      render();
    });
  });

  document.querySelectorAll("th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.sort;
      if (sort.key === key) sort.dir *= -1;
      else { sort.key = key; sort.dir = 1; }
      render();
    });
  });

  $("clearDone").addEventListener("click", () => {
    if (!items.some(i => i.done)) return;
    if (confirm("完了したタスクをすべて削除しますか？")) {
      items = items.filter(i => !i.done);
      save();
      render();
    }
  });

  render();
</script>
</body>
</html>
